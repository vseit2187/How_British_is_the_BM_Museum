<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Help - Site Navigation</title>
  <link rel="stylesheet" href="./css/style.css">
  
  <style>
    body {
      background: rgba(245, 240, 232, 1); /* Matches your main site background */
    }

    /* Navigation Back Button */
    .back-nav {
      position: absolute;
      top: 40px;
      left: 40px;
    }
    
    .back-nav a {
      text-decoration: none;
      color: var(--stone, #8B8278);
      font-weight: bold;
      font-size: 1.1rem;
      transition: color 0.2s ease;
    }

    .back-nav a:hover {
      color: var(--ink, #1a1614);
    }

    /* Grid Layout */
    .help-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(40px, 5vw, 80px);
      align-items: center;
      min-height: 100vh;
      max-width: 1000px;
      margin: 0 auto;
      padding: 80px 40px 40px;
    }

    .help-text h1 {
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.3;
      margin-bottom: 16px;
    }

    .help-text span {
      font-size: 1.2em;
      color: var(--stone, #8B8278);
      font-style: italic;
    }

    /* Vertical video wrapper */
    .video-wrapper {
      position: relative;
      width: 100%;
      max-width: 360px;
      margin: 0 auto;
      aspect-ratio: 9 / 16;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(26,22,20,0.15);
    }

    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      .help-container {
        grid-template-columns: 1fr;
        text-align: center;
      }
      .back-nav {
        top: 20px;
        left: 20px;
      }
    }
  </style>
</head>
<body>

  <!-- Top Left Back Link -->
  <div class="back-nav">
    <a href="index.html">← Back to the project</a>
  </div>

  <!-- Main Content Grid -->
  <div class="help-container">
    <div class="help-text">
      <h1>Having trouble navigating the site?</h1>
      <span>Watch this walkthrough video &gt;</span>
    </div>

    <div class="video-wrapper">
      <iframe 
        src="https://www.youtube.com/embed/iMK645Aawq4" 
        title="Site Navigation Walkthrough" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
        allowfullscreen>
      </iframe>
    </div>
  </div>

</body>
</html>
